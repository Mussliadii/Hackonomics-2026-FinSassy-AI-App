version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finsassy-postgres
    environment:
      POSTGRES_DB: finsassy
      POSTGRES_USER: finsassy
      POSTGRES_PASSWORD: finsassy_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finsassy-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
